name: 🏦 PhysiOps Banking CI — ESP32 Hardware Monitor

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-test-monitor:
    name: Build, Test & Notify ESP32
    runs-on: [self-hosted, Windows, X64]

    env:
      RUNNER_TOOL_CACHE: C:\actions-runner\toolcache
      RUNNER_TEMP: C:\actions-runner\temp

    steps:
      # 1. Checkout
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Ensure runner cache/temp folders exist
      - name: 🛠️ Prepare Runner Cache/Temp Folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "C:\actions-runner\toolcache" -Force | Out-Null
          New-Item -ItemType Directory -Path "C:\actions-runner\temp" -Force | Out-Null

      # 3. Setup Node.js
      - name: 🟢 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 4. Install Node dependencies (CMD shell = more stable on Windows)
      - name: 📦 Install Node Dependencies
        shell: cmd
        working-directory: backend
        run: |
          if exist package-lock.json (
            npm ci
          ) else (
            npm install
          )

      # 5. Run tests (CMD shell avoids PowerShell NativeCommandError issue)
      - name: 🧪 Run Test Suite
        id: run_tests
        timeout-minutes: 5
        shell: cmd
        working-directory: backend
        run: |
          npm test > ..\tests.log 2>&1
          type ..\tests.log

      # 6. Upload test logs (always)
      - name: 📁 Upload Test Logs
        if: always() && hashFiles('tests.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: tests.log

      # 7. Verify Python on runner
      - name: 🐍 Verify Python on Runner
        if: steps.run_tests.outcome == 'success'
        shell: powershell
        run: |
          python --version
          python -m pip --version

      # 8. Install psutil
      - name: 📦 Install psutil
        if: steps.run_tests.outcome == 'success'
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install psutil

