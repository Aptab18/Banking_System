name: 🏦 PhysiOps Banking CI — ESP32 Hardware Monitor

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  build-test-monitor:
    name: Build, Test & Notify ESP32
    runs-on: [self-hosted, Windows, X64]

    env:
      RUNNER_TOOL_CACHE: C:\actions-runner\toolcache
      RUNNER_TEMP: C:\actions-runner\temp

    steps:
      # 1. Checkout
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Ensure runner cache/temp folders exist
      - name: 🛠️ Prepare Runner Cache/Temp Folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "C:\actions-runner\toolcache" -Force | Out-Null
          New-Item -ItemType Directory -Path "C:\actions-runner\temp" -Force | Out-Null

      # 3. Setup Node
      - name: 🟢 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 4. Install dependencies (CMD shell for Windows stability)
      - name: 📦 Install Node Dependencies
        shell: cmd
        working-directory: backend
        run: |
          if exist package-lock.json (
            npm ci
          ) else (
            npm install
          )

      # 5. Run tests (CMD shell fixes PowerShell NativeCommandError issue)
      - name: 🧪 Run Test Suite
        id: run_tests
        timeout-minutes: 5
        shell: cmd
        working-directory: backend
        run: |
          npm test > ..\tests.log 2>&1
          type ..\tests.log

      # 6. Verify Python on runner
      - name: 🐍 Verify Python on Runner
        if: steps.run_tests.outcome == 'success'
        shell: powershell
        run: |
          python --version
          python -m pip --version

      # 7. Install psutil
      - name: 📦 Install psutil
        if: steps.run_tests.outcome == 'success'
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install psutil

      # 8. RAM Stress + Resource Check
      - name: 🔍 RAM Stress + Resource Check (psutil)
        id: resource_check
        if: steps.run_tests.outcome == 'success'
        continue-on-error: true
        shell: powershell
        run: |
          Write-Host "RAM Stress starting (max 90% cap — PC safe rahega)..."
          $proc = Start-Process python -ArgumentList "backend/scripts/infinite_loop_sim.py","--max-percent","90","--seconds","60" -PassThru -WindowStyle Hidden

          Write-Host "Waiting 40 seconds for RAM to fill..."
          Start-Sleep -Seconds 40

          Write-Host "Checking RAM & Storage..."
          python backend/scripts/resource_monitor.py
          $exitCode = $LASTEXITCODE

          Write-Host "Stopping RAM stress process..."
          if ($proc -and !$proc.HasExited) {
            $proc.Kill()
            $proc.WaitForExit()
          }

          Write-Host "RAM released."
          exit $exitCode

      # 9a. RAM/Storage Warning
      - name: 🟠 Notify ESP32 — RAM/Storage Warning
        if: steps.run_tests.outcome == 'success' && steps.resource_check.outcome == 'failure'
        continue-on-error: true
        shell: powershell
        run: |
          $esp32Ip = "${{ secrets.ESP32_IP }}"

          if ([string]::IsNullOrWhiteSpace($esp32Ip)) {
            Write-Error "ESP32_IP secret is missing."
            exit 1
          }

          $body = @{
            status = "ram_warning"
            branch = "${{ github.ref_name }}"
            commit = "${{ github.sha }}"
            ram_usage = "${{ steps.resource_check.outputs.ram_percent }}"
          } | ConvertTo-Json -Compress

          Invoke-RestMethod `
            -Uri "http://$esp32Ip/webhook" `
            -Method Post `
            -ContentType "application/json" `
            -Body $body `
            -TimeoutSec 5

          Write-Host "RAM warning sent to ESP32"

      # 9b. Build Successful
      - name: 🟢 Notify ESP32 — Build Successful
        if: steps.run_tests.outcome == 'success' && steps.resource_check.outcome == 'success'
        continue-on-error: true
        shell: powershell
        run: |
          $esp32Ip = "${{ secrets.ESP32_IP }}"

          if ([string]::IsNullOrWhiteSpace($esp32Ip)) {
            Write-Error "ESP32_IP secret is missing."
            exit 1
          }

          $body = @{
            status = "build_success"
            branch = "${{ github.ref_name }}"
            commit = "${{ github.sha }}"
          } | ConvertTo-Json -Compress

          Invoke-RestMethod `
            -Uri "http://$esp32Ip/webhook" `
            -Method Post `
            -ContentType "application/json" `
            -Body $body `
            -TimeoutSec 5

          Write-Host "Build success sent to ESP32"

      # 9c. Extract Failure Summary (only if failed)
      - name: 📝 Extract Failure Summary
        if: always() && steps.run_tests.outcome == 'failure'
        id: extract_summary
        shell: powershell
        run: |
          $summary = "Test Execution Failed"

          if (Test-Path "tests.log") {
            $logs = Get-Content "tests.log" -Tail 5
            if ($logs) {
              $summary = $logs -join " | "
            }
          }

          # Clean up summary for GitHub output / JSON safety
          $summary = $summary -replace '"', '' -replace "'", "" -replace "`n", " " -replace "`r", ""

          if ($summary.Length -gt 150) {
            $summary = $summary.Substring(0, 147) + "..."
          }

          "summary=$summary" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Captured Summary: $summary"

      # 9d. Notify ESP32 — Build Failed
      - name: 🔴 Notify ESP32 — Build Failed
        if: always() && steps.run_tests.outcome == 'failure'
        continue-on-error: true
        shell: powershell
        run: |
          $esp32Ip = "${{ secrets.ESP32_IP }}"

          if ([string]::IsNullOrWhiteSpace($esp32Ip)) {
            Write-Error "ESP32_IP secret is missing."
            exit 1
          }

          $body = @{
            status = "build_failed"
            branch = "${{ github.ref_name }}"
            commit = "${{ github.sha }}"
            summary = "${{ steps.extract_summary.outputs.summary }}"
          } | ConvertTo-Json -Compress

          Invoke-RestMethod `
            -Uri "http://$esp32Ip/webhook" `
            -Method Post `
            -ContentType "application/json" `
            -Body $body `
            -TimeoutSec 5

          Write-Host "Build failed sent to ESP32"
