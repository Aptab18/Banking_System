name: 🏦 PhysiOps Banking CI — ESP32 Hardware Monitor

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-test-monitor:
    name: Build, Test & Notify ESP32
    runs-on: [self-hosted, Windows, X64]

    env:
      RUNNER_TOOL_CACHE: C:\actions-runner\toolcache
      RUNNER_TEMP: C:\actions-runner\temp

    steps:
      # 1. Checkout
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Ensure runner cache/temp folders exist
      - name: 🛠️ Prepare Runner Cache/Temp Folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "C:\actions-runner\toolcache" -Force | Out-Null
          New-Item -ItemType Directory -Path "C:\actions-runner\temp" -Force | Out-Null

      # 3. Setup Node.js
      - name: 🟢 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 4. Install Node dependencies (CMD shell = more stable on Windows)
      - name: 📦 Install Node Dependencies
        shell: cmd
        working-directory: backend
        run: |
          if exist package-lock.json (
            npm ci
          ) else (
            npm install
          )

      # 5. Run tests (CMD shell avoids PowerShell NativeCommandError issue)
      - name: 🧪 Run Test Suite
        id: run_tests
        timeout-minutes: 5
        shell: cmd
        working-directory: backend
        run: |
          npm test > ..\tests.log 2>&1
          type ..\tests.log

      # 6. Upload test logs (always)
      - name: 📁 Upload Test Logs
        if: always() && hashFiles('tests.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: tests.log

      # 7. Verify Python on runner
      - name: 🐍 Verify Python on Runner
        if: steps.run_tests.outcome == 'success'
        shell: powershell
        run: |
          python --version
          python -m pip --version

      # 8. Install psutil
      - name: 📦 Install psutil
        if: steps.run_tests.outcome == 'success'
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install psutil

      # 9. RAM Stress + Immediate ESP32 Alert
      - name: 🔍 RAM Stress + Immediate ESP32 Alert
        id: resource_check
        if: steps.run_tests.outcome == 'success'
        continue-on-error: true
        shell: powershell
        run: |
          $threshold = 85
          $esp32Ip = "${{ secrets.ESP32_IP }}"

          if ([string]::IsNullOrWhiteSpace($esp32Ip)) {
            Write-Error "ESP32_IP secret is missing."
            exit 1
          }

          Write-Host "Starting RAM stress process..."
          $proc = Start-Process python -ArgumentList "backend/scripts/infinite_loop_sim.py","--seconds","60","--chunk-mb","20" -PassThru -WindowStyle Hidden

          $detected = $false
          $ram = 0

          Write-Host "Monitoring RAM every 1 second... Threshold = $threshold%"

          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 1

            $ramRaw = python -c "import psutil; print(psutil.virtual_memory().percent)"
            $ramRaw = $ramRaw.Trim()
            $ram = [double]::Parse($ramRaw, [System.Globalization.CultureInfo]::InvariantCulture)

            Write-Host "Current RAM: $ram%"

            if ($ram -ge $threshold) {
              Write-Host "🚨 Threshold hit! RAM = $ram%"

              # Save RAM for future steps / debugging
              "ram_percent=$ram" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

              # Send ESP32 signal IMMEDIATELY
              $body = @{
                status = "ram_warning"
                branch = "${{ github.ref_name }}"
                commit = "${{ github.sha }}"
                ram_usage = "$ram"
              } | ConvertTo-Json -Compress

              Write-Host "Sending immediate RAM warning to ESP32..."
              Write-Host "Payload: $body"

              try {
                $response = Invoke-RestMethod `
                  -Uri "http://$esp32Ip/webhook" `
                  -Method Post `
                  -ContentType "application/json" `
                  -Body $body `
                  -TimeoutSec 10

                Write-Host "ESP32 response:"
                Write-Host $response
                Write-Host "✅ RAM warning sent immediately."
              }
              catch {
                Write-Error "❌ Failed to send RAM warning to ESP32: $($_.Exception.Message)"
              }

              $detected = $true
              break
            }
          }

          Write-Host "Stopping RAM stress process..."
          if ($proc -and !$proc.HasExited) {
            $proc.Kill()
            $proc.WaitForExit()
          }

          Write-Host "RAM stress process stopped."

          if ($detected) {
            Write-Host "Threshold was detected and ESP32 alert was attempted."
            exit 1
          } else {
            Write-Host "Threshold not reached within monitoring window."
            "ram_percent=$ram" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

      # 10. Build Successful (only if tests passed and RAM threshold NOT hit)
      - name: 🟢 Notify ESP32 — Build Successful
        if: steps.run_tests.outcome == 'success' && steps.resource_check.outcome == 'success'
        continue-on-error: true
        shell: powershell
        run: |
          $esp32Ip = "${{ secrets.ESP32_IP }}"

          if ([string]::IsNullOrWhiteSpace($esp32Ip)) {
            Write-Error "ESP32_IP secret is missing."
            exit 1
          }

          $body = @{
            status = "build_success"
            branch = "${{ github.ref_name }}"
            commit = "${{ github.sha }}"
          } | ConvertTo-Json -Compress

          Invoke-RestMethod `
            -Uri "http://$esp32Ip/webhook" `
            -Method Post `
            -ContentType "application/json" `
            -Body $body `
            -TimeoutSec 5

          Write-Host "Build success sent to ESP32"

      # 11. Extract Failure Summary (server.js focused + ESP32 friendly)
      - name: 📝 Extract Failure Summary
        if: always() && steps.run_tests.outcome == 'failure'
        id: extract_summary
        shell: powershell
        run: |
          $summary = "Test Execution Failed"

          if (Test-Path "tests.log") {
            $logs = Get-Content "tests.log"

            # Detect specific root causes first (best for ESP32 display)
            if ($logs -match 'Cannot find module') {
              $summary = "Module path error"
            }
            elseif ($logs -match 'EADDRINUSE') {
              $summary = "Port already in use"
            }
            elseif ($logs -match 'ECONNREFUSED') {
              $summary = "Connection refused"
            }
            elseif ($logs -match 'backend[/\\]server\.js|server\.js') {
              $summary = "server.js runtime error"
            }
            else {
              # 1) Prefer server.js stack/error line
              $serverLine = $logs | Select-String -Pattern 'server\.js|backend[/\\]server\.js' | Select-Object -First 1
              if ($serverLine) {
                $summary = $serverLine.Line.Trim()
              }

              # 2) Prefer common root-cause errors
              if ($summary -eq "Test Execution Failed") {
                $rootError = $logs | Select-String -Pattern 'Cannot find module|EADDRINUSE|ECONNREFUSED|TypeError|ReferenceError|SyntaxError|Error:' | Select-Object -First 1
                if ($rootError) {
                  $summary = $rootError.Line.Trim()
                }
              }

              # 3) If still nothing, prefer FAIL line
              if ($summary -eq "Test Execution Failed") {
                $failLine = $logs | Select-String -Pattern '^FAIL\s+' | Select-Object -First 1
                if ($failLine) {
                  $summary = $failLine.Line.Trim()
                }
              }

              # 4) If still nothing, prefer Expected/Received
              if ($summary -eq "Test Execution Failed") {
                $assertLine = $logs | Select-String -Pattern 'Expected:|Received:' | Select-Object -First 1
                if ($assertLine) {
                  $summary = $assertLine.Line.Trim()
                }
              }

              # 5) Fallback = last meaningful line (ignore Jest footer junk)
              if ($summary -eq "Test Execution Failed") {
                $meaningful = $logs | Where-Object {
                  $_.Trim() -ne "" -and
                  $_ -notmatch 'Tests:\s+\d+' -and
                  $_ -notmatch 'Snapshots:\s+' -and
                  $_ -notmatch 'Time:\s+' -and
                  $_ -notmatch 'Ran all test suites' -and
                  $_ -notmatch 'Force exiting Jest'
                }

                if ($meaningful.Count -gt 0) {
                  $summary = $meaningful[-1].Trim()
                }
              }
            }
          }

          # Clean up summary for GitHub output / JSON safety
          $summary = $summary -replace '"', '' -replace "'", "" -replace "`n", " " -replace "`r", ""

          if ($summary.Length -gt 100) {
            $summary = $summary.Substring(0, 97) + "..."
          }

          "summary=$summary" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Captured Summary: $summary"

      # 12. Build Failed (only if tests failed)
      - name: 🔴 Notify ESP32 — Build Failed
        if: always() && steps.run_tests.outcome == 'failure'
        continue-on-error: true
        shell: powershell
        run: |
          $esp32Ip = "${{ secrets.ESP32_IP }}"

          if ([string]::IsNullOrWhiteSpace($esp32Ip)) {
            Write-Error "ESP32_IP secret is missing."
            exit 1
          }

          $body = @{
            status = "build_failed"
            branch = "${{ github.ref_name }}"
            commit = "${{ github.sha }}"
            summary = "${{ steps.extract_summary.outputs.summary }}"
          } | ConvertTo-Json -Compress

          Invoke-RestMethod `
            -Uri "http://$esp32Ip/webhook" `
            -Method Post `
            -ContentType "application/json" `
            -Body $body `
            -TimeoutSec 5

          Write-Host "Build failed sent to ESP32"
